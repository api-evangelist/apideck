    scope: contract
    metric: requests_per_minute
    limit: 1000
    burst: 5000
    timeFrame: minute
    applies:
      - Apideck
      - Apideck Accounting API
      - Apideck CRM API
      - Apideck HRIS API
      - Apideck ATS API
