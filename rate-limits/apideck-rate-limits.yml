specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Apideck
providerId: apideck
created: '2026-05-04'
modified: '2026-05-04'
tags:
  - Integrations
  - Unified API
  - Rate Limiting
  - Quotas
  - Throttling
description: Machine-readable rate limit definitions for the Apideck API surface. Captures per-tier quotas,
  burst behavior, response signaling, and recovery semantics. Defaults are scaffold values to be replaced
  with published provider limits.
headers:
  limit: X-RateLimit-Limit
  remaining: X-RateLimit-Remaining
  reset: X-RateLimit-Reset
  retryAfter: Retry-After
  policy: RateLimit-Policy
responseCodes:
  throttled: 429
  quotaExceeded: 429
  serviceUnavailable: 503
limits:
  - tier: free
    name: Free Tier Default
    scope: api-key
    metric: requests_per_minute
    limit: 10
    burst: 20
    timeFrame: minute
    applies:
      - Apideck
      - Apideck Accounting API
      - Apideck CRM API
      - Apideck HRIS API
      - Apideck ATS API
      - Apideck File Storage API
      - Apideck Ecommerce API
      - Apideck POS API
      - Apideck Issue Tracking API
      - Apideck Lead API
      - Apideck SMS API
      - Apideck Vault API
      - Apideck Webhook API
      - Apideck Connector API
      - Apideck Proxy API
  - tier: free
    name: Free Tier Monthly Quota
    scope: api-key
    metric: requests_per_month
    limit: 1000
    timeFrame: month
    applies:
      - Apideck
      - Apideck Accounting API
      - Apideck CRM API
      - Apideck HRIS API
      - Apideck ATS API
      - Apideck File Storage API
      - Apideck Ecommerce API
      - Apideck POS API
      - Apideck Issue Tracking API
      - Apideck Lead API
      - Apideck SMS API
      - Apideck Vault API
      - Apideck Webhook API
      - Apideck Connector API
      - Apideck Proxy API
  - tier: professional
    name: Professional Tier Default
    scope: api-key
    metric: requests_per_minute
    limit: 100
    burst: 200
    timeFrame: minute
    applies:
      - Apideck
      - Apideck Accounting API
      - Apideck CRM API
      - Apideck HRIS API
      - Apideck ATS API
      - Apideck File Storage API
      - Apideck Ecommerce API
      - Apideck POS API
      - Apideck Issue Tracking API
      - Apideck Lead API
      - Apideck SMS API
      - Apideck Vault API
      - Apideck Webhook API
      - Apideck Connector API
      - Apideck Proxy API
  - tier: professional
    name: Professional Tier Monthly Quota
    scope: api-key
    metric: requests_per_month
    limit: 100000
    timeFrame: month
    applies:
      - Apideck
      - Apideck Accounting API
      - Apideck CRM API
      - Apideck HRIS API
      - Apideck ATS API
      - Apideck File Storage API
      - Apideck Ecommerce API
      - Apideck POS API
      - Apideck Issue Tracking API
