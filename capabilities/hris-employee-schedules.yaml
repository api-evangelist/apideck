naftiko: 1.0.0-alpha2
info:
  label: Apideck HRIS API — Employee Schedules
  description: 'Apideck HRIS API — Employee Schedules. 1 operations. Lead operation: Apideck List Employee Schedules. Self-contained
    Naftiko capability covering one Apideck business surface.'
  tags:
  - Apideck
  - Employee Schedules
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APIDECK_API_KEY: APIDECK_API_KEY
capability:
  consumes:
  - type: http
    namespace: hris-employee-schedules
    baseUri: https://unify.apideck.com
    description: Apideck HRIS API — Employee Schedules business capability. Self-contained, no shared references.
    resources:
    - name: hris-schedules-employees-employee_id
      path: /hris/schedules/employees/{employee_id}
      operations:
      - name: employeeschedulesall
        method: GET
        description: Apideck List Employee Schedules
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.APIDECK_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: hris-employee-schedules-rest
    port: 8080
    description: REST adapter for Apideck HRIS API — Employee Schedules. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/hris/schedules/employees/{employee-id}
      name: hris-schedules-employees-employee-id
      description: REST surface for hris-schedules-employees-employee_id.
      operations:
      - method: GET
        name: employeeschedulesall
        description: Apideck List Employee Schedules
        call: hris-employee-schedules.employeeschedulesall
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: hris-employee-schedules-mcp
    port: 9090
    transport: http
    description: MCP adapter for Apideck HRIS API — Employee Schedules. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: apideck-list-employee-schedules
      description: Apideck List Employee Schedules
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: hris-employee-schedules.employeeschedulesall
      outputParameters:
      - type: object
        mapping: $.
