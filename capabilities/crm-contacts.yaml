      name: crm-contacts
      description: REST surface for crm-contacts.
      operations:
      - method: GET
        name: contactsall
        description: Apideck List contacts
        call: crm-contacts.contactsall
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
