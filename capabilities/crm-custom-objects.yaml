      - name: customobjectsdelete
        method: DELETE
        description: Apideck Delete custom object
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.APIDECK_API_KEY}}'
      placement: header
  exposes:
