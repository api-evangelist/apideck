        mapping: $.
    - name: apideck-get-custom-object
      description: Apideck Get custom object
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: crm-custom-objects.customobjectsone
      outputParameters:
      - type: object
        mapping: $.
    - name: apideck-update-custom-object
      description: Apideck Update custom object
      hints:
        readOnly: false
        destructive: false
        idempotent: true
