    resources:
    - path: /v1/crm/activities
      name: crm-activities
      description: REST surface for crm-activities.
      operations:
      - method: GET
        name: activitiesall
        description: Apideck List activities
        call: crm-activities.activitiesall
        outputParameters:
        - type: object
