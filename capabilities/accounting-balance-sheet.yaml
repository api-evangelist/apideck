naftiko: 1.0.0-alpha2
info:
  label: Apideck Accounting API — Balance Sheet
  description: 'Apideck Accounting API — Balance Sheet. 1 operations. Lead operation: Apideck Get BalanceSheet. Self-contained
    Naftiko capability covering one Apideck business surface.'
  tags:
  - Apideck
  - Balance Sheet
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APIDECK_API_KEY: APIDECK_API_KEY
capability:
  consumes:
  - type: http
    namespace: accounting-balance-sheet
    baseUri: https://unify.apideck.com
    description: Apideck Accounting API — Balance Sheet business capability. Self-contained, no shared references.
    resources:
    - name: accounting-balance-sheet
      path: /accounting/balance-sheet
      operations:
      - name: balancesheetone
        method: GET
        description: Apideck Get BalanceSheet
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.APIDECK_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: accounting-balance-sheet-rest
    port: 8080
    description: REST adapter for Apideck Accounting API — Balance Sheet. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/accounting/balance-sheet
      name: accounting-balance-sheet
      description: REST surface for accounting-balance-sheet.
      operations:
      - method: GET
        name: balancesheetone
        description: Apideck Get BalanceSheet
        call: accounting-balance-sheet.balancesheetone
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: accounting-balance-sheet-mcp
    port: 9090
    transport: http
    description: MCP adapter for Apideck Accounting API — Balance Sheet. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: apideck-get-balancesheet
      description: Apideck Get BalanceSheet
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: accounting-balance-sheet.balancesheetone
      outputParameters:
      - type: object
        mapping: $.
