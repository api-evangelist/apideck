    resources:
    - name: crm-companies
      path: /crm/companies
      operations:
      - name: companiesall
        method: GET
        description: Apideck List companies
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: companiesadd
        method: POST
        description: Apideck Create company
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: crm-companies-id
      path: /crm/companies/{id}
      operations:
      - name: companiesone
        method: GET
        description: Apideck Get company
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: companiesupdate
