    namespace: crm-companies-rest
    port: 8080
    description: REST adapter for Apideck CRM API — Companies. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/crm/companies
      name: crm-companies
      description: REST surface for crm-companies.
      operations:
      - method: GET
        name: companiesall
        description: Apideck List companies
        call: crm-companies.companiesall
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: companiesadd
        description: Apideck Create company
        call: crm-companies.companiesadd
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/crm/companies/{id}
