    namespace: accounting-employees
    baseUri: https://unify.apideck.com
    description: Apideck Accounting API — Employees business capability. Self-contained, no shared references.
    resources:
    - name: accounting-employees
      path: /accounting/employees
      operations:
      - name: employeesall
        method: GET
        description: Apideck List Employees
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: employeesadd
        method: POST
        description: Apideck Create Employee
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: accounting-employees-id
      path: /accounting/employees/{id}
      operations:
      - name: employeesone
        method: GET
        description: Apideck Get Employee
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: employeesupdate
        method: PATCH
        description: Apideck Update Employee
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: employeesdelete
        method: DELETE
        description: Apideck Delete Employee
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.APIDECK_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: accounting-employees-rest
    port: 8080
    description: REST adapter for Apideck Accounting API — Employees. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/accounting/employees
      name: accounting-employees
      description: REST surface for accounting-employees.
      operations:
      - method: GET
        name: employeesall
        description: Apideck List Employees
        call: accounting-employees.employeesall
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: employeesadd
        description: Apideck Create Employee
        call: accounting-employees.employeesadd
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/accounting/employees/{id}
      name: accounting-employees-id
      description: REST surface for accounting-employees-id.
      operations:
      - method: GET
        name: employeesone
        description: Apideck Get Employee
        call: accounting-employees.employeesone
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: employeesupdate
        description: Apideck Update Employee
        call: accounting-employees.employeesupdate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: employeesdelete
        description: Apideck Delete Employee
        call: accounting-employees.employeesdelete
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: accounting-employees-mcp
    port: 9090
    transport: http
    description: MCP adapter for Apideck Accounting API — Employees. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: apideck-list-employees
      description: Apideck List Employees
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: accounting-employees.employeesall
      outputParameters:
      - type: object
        mapping: $.
    - name: apideck-create-employee
      description: Apideck Create Employee
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: accounting-employees.employeesadd
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: apideck-get-employee
      description: Apideck Get Employee
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: accounting-employees.employeesone
      outputParameters:
      - type: object
        mapping: $.
    - name: apideck-update-employee
      description: Apideck Update Employee
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: accounting-employees.employeesupdate
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: apideck-delete-employee
      description: Apideck Delete Employee
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: accounting-employees.employeesdelete
      outputParameters:
      - type: object
        mapping: $.
