naftiko: 1.0.0-alpha2
info:
  label: Apideck Accounting API — Employees
  description: 'Apideck Accounting API — Employees. 5 operations. Lead operation: Apideck List Employees. Self-contained Naftiko
    capability covering one Apideck business surface.'
  tags:
  - Apideck
  - Employees
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APIDECK_API_KEY: APIDECK_API_KEY
capability:
