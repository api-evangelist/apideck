naftiko: 1.0.0-alpha2
info:
  label: Apideck File storage API — Folders
  description: 'Apideck File storage API — Folders. 5 operations. Lead operation: Apideck Create Folder. Self-contained Naftiko
    capability covering one Apideck business surface.'
  tags:
  - Apideck
  - Folders
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APIDECK_API_KEY: APIDECK_API_KEY
capability:
  consumes:
  - type: http
    namespace: file-storage-folders
    baseUri: https://unify.apideck.com
    description: Apideck File storage API — Folders business capability. Self-contained, no shared references.
    resources:
    - name: file-storage-folders
      path: /file-storage/folders
      operations:
      - name: foldersadd
        method: POST
        description: Apideck Create Folder
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: file-storage-folders-id
      path: /file-storage/folders/{id}
      operations:
      - name: foldersone
        method: GET
        description: Apideck Get Folder
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: foldersupdate
        method: PATCH
        description: Apideck Rename or move Folder
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: foldersdelete
        method: DELETE
        description: Apideck Delete Folder
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: file-storage-folders-id-copy
      path: /file-storage/folders/{id}/copy
      operations:
      - name: folderscopy
        method: POST
        description: Apideck Copy Folder
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.APIDECK_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: file-storage-folders-rest
    port: 8080
    description: REST adapter for Apideck File storage API — Folders. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/file-storage/folders
      name: file-storage-folders
      description: REST surface for file-storage-folders.
      operations:
      - method: POST
        name: foldersadd
        description: Apideck Create Folder
        call: file-storage-folders.foldersadd
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/file-storage/folders/{id}
      name: file-storage-folders-id
      description: REST surface for file-storage-folders-id.
      operations:
      - method: GET
        name: foldersone
        description: Apideck Get Folder
        call: file-storage-folders.foldersone
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: foldersupdate
        description: Apideck Rename or move Folder
        call: file-storage-folders.foldersupdate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: foldersdelete
        description: Apideck Delete Folder
        call: file-storage-folders.foldersdelete
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/file-storage/folders/{id}/copy
      name: file-storage-folders-id-copy
      description: REST surface for file-storage-folders-id-copy.
      operations:
      - method: POST
        name: folderscopy
        description: Apideck Copy Folder
        call: file-storage-folders.folderscopy
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: file-storage-folders-mcp
    port: 9090
    transport: http
    description: MCP adapter for Apideck File storage API — Folders. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: apideck-create-folder
      description: Apideck Create Folder
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: file-storage-folders.foldersadd
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: apideck-get-folder
      description: Apideck Get Folder
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: file-storage-folders.foldersone
      outputParameters:
      - type: object
        mapping: $.
    - name: apideck-rename-move-folder
      description: Apideck Rename or move Folder
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: file-storage-folders.foldersupdate
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: apideck-delete-folder
      description: Apideck Delete Folder
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: file-storage-folders.foldersdelete
      outputParameters:
      - type: object
        mapping: $.
    - name: apideck-copy-folder
      description: Apideck Copy Folder
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: file-storage-folders.folderscopy
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
