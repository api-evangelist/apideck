naftiko: 1.0.0-alpha2
info:
  label: Apideck HRIS API — Payrolls
  description: 'Apideck HRIS API — Payrolls. 2 operations. Lead operation: Apideck List Payroll. Self-contained Naftiko capability
    covering one Apideck business surface.'
  tags:
  - Apideck
  - Payrolls
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APIDECK_API_KEY: APIDECK_API_KEY
capability:
  consumes:
  - type: http
    namespace: hris-payrolls
    baseUri: https://unify.apideck.com
    description: Apideck HRIS API — Payrolls business capability. Self-contained, no shared references.
    resources:
    - name: hris-payrolls
      path: /hris/payrolls
      operations:
      - name: payrollsall
        method: GET
        description: Apideck List Payroll
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: hris-payrolls-payroll_id
      path: /hris/payrolls/{payroll_id}
      operations:
      - name: payrollsone
        method: GET
        description: Apideck Get Payroll
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.APIDECK_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: hris-payrolls-rest
    port: 8080
    description: REST adapter for Apideck HRIS API — Payrolls. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/hris/payrolls
      name: hris-payrolls
      description: REST surface for hris-payrolls.
      operations:
      - method: GET
        name: payrollsall
        description: Apideck List Payroll
        call: hris-payrolls.payrollsall
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/hris/payrolls/{payroll-id}
      name: hris-payrolls-payroll-id
      description: REST surface for hris-payrolls-payroll_id.
      operations:
      - method: GET
        name: payrollsone
        description: Apideck Get Payroll
        call: hris-payrolls.payrollsone
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: hris-payrolls-mcp
    port: 9090
    transport: http
    description: MCP adapter for Apideck HRIS API — Payrolls. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: apideck-list-payroll
      description: Apideck List Payroll
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: hris-payrolls.payrollsall
      outputParameters:
      - type: object
        mapping: $.
    - name: apideck-get-payroll
      description: Apideck Get Payroll
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: hris-payrolls.payrollsone
      outputParameters:
      - type: object
        mapping: $.
