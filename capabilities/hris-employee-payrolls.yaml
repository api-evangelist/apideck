naftiko: 1.0.0-alpha2
info:
  label: Apideck HRIS API — Employee Payrolls
  description: 'Apideck HRIS API — Employee Payrolls. 2 operations. Lead operation: Apideck List Employee Payrolls. Self-contained
    Naftiko capability covering one Apideck business surface.'
  tags:
  - Apideck
  - Employee Payrolls
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APIDECK_API_KEY: APIDECK_API_KEY
capability:
  consumes:
  - type: http
    namespace: hris-employee-payrolls
    baseUri: https://unify.apideck.com
    description: Apideck HRIS API — Employee Payrolls business capability. Self-contained, no shared references.
    resources:
    - name: hris-payrolls-employees-employee_id
      path: /hris/payrolls/employees/{employee_id}
      operations:
      - name: employeepayrollsall
        method: GET
        description: Apideck List Employee Payrolls
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: hris-payrolls-employees-employee_id-payrolls-payroll_id
      path: /hris/payrolls/employees/{employee_id}/payrolls/{payroll_id}
      operations:
      - name: employeepayrollsone
        method: GET
        description: Apideck Get Employee Payroll
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.APIDECK_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: hris-employee-payrolls-rest
    port: 8080
    description: REST adapter for Apideck HRIS API — Employee Payrolls. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/hris/payrolls/employees/{employee-id}
      name: hris-payrolls-employees-employee-id
      description: REST surface for hris-payrolls-employees-employee_id.
      operations:
      - method: GET
        name: employeepayrollsall
        description: Apideck List Employee Payrolls
        call: hris-employee-payrolls.employeepayrollsall
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/hris/payrolls/employees/{employee-id}/payrolls/{payroll-id}
      name: hris-payrolls-employees-employee-id-payrolls-payroll-id
      description: REST surface for hris-payrolls-employees-employee_id-payrolls-payroll_id.
      operations:
      - method: GET
        name: employeepayrollsone
        description: Apideck Get Employee Payroll
        call: hris-employee-payrolls.employeepayrollsone
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: hris-employee-payrolls-mcp
    port: 9090
    transport: http
    description: MCP adapter for Apideck HRIS API — Employee Payrolls. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: apideck-list-employee-payrolls
      description: Apideck List Employee Payrolls
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: hris-employee-payrolls.employeepayrollsall
      outputParameters:
      - type: object
        mapping: $.
    - name: apideck-get-employee-payroll
      description: Apideck Get Employee Payroll
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: hris-employee-payrolls.employeepayrollsone
      outputParameters:
      - type: object
        mapping: $.
