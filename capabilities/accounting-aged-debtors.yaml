naftiko: 1.0.0-alpha2
info:
  label: Apideck Accounting API — Aged Debtors
  description: 'Apideck Accounting API — Aged Debtors. 1 operations. Lead operation: Apideck Get Aged Debtors. Self-contained
    Naftiko capability covering one Apideck business surface.'
  tags:
  - Apideck
  - Aged Debtors
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APIDECK_API_KEY: APIDECK_API_KEY
capability:
  consumes:
  - type: http
    namespace: accounting-aged-debtors
    baseUri: https://unify.apideck.com
    description: Apideck Accounting API — Aged Debtors business capability. Self-contained, no shared references.
    resources:
    - name: accounting-aged-debtors
      path: /accounting/aged-debtors
      operations:
      - name: ageddebtorsone
        method: GET
        description: Apideck Get Aged Debtors
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.APIDECK_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: accounting-aged-debtors-rest
    port: 8080
    description: REST adapter for Apideck Accounting API — Aged Debtors. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/accounting/aged-debtors
      name: accounting-aged-debtors
      description: REST surface for accounting-aged-debtors.
      operations:
      - method: GET
        name: ageddebtorsone
        description: Apideck Get Aged Debtors
        call: accounting-aged-debtors.ageddebtorsone
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: accounting-aged-debtors-mcp
    port: 9090
    transport: http
    description: MCP adapter for Apideck Accounting API — Aged Debtors. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: apideck-get-aged-debtors
      description: Apideck Get Aged Debtors
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: accounting-aged-debtors.ageddebtorsone
      outputParameters:
      - type: object
        mapping: $.
