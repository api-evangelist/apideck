naftiko: 1.0.0-alpha2
info:
  label: Apideck Accounting API — Categories
  description: 'Apideck Accounting API — Categories. 2 operations. Lead operation: Apideck List Categories. Self-contained
    Naftiko capability covering one Apideck business surface.'
  tags:
  - Apideck
  - Categories
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APIDECK_API_KEY: APIDECK_API_KEY
capability:
  consumes:
  - type: http
    namespace: accounting-categories
    baseUri: https://unify.apideck.com
    description: Apideck Accounting API — Categories business capability. Self-contained, no shared references.
    resources:
    - name: accounting-categories
      path: /accounting/categories
      operations:
      - name: categoriesall
        method: GET
        description: Apideck List Categories
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: accounting-categories-id
      path: /accounting/categories/{id}
      operations:
      - name: categoriesone
        method: GET
        description: Apideck Get Category
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.APIDECK_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: accounting-categories-rest
    port: 8080
    description: REST adapter for Apideck Accounting API — Categories. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/accounting/categories
      name: accounting-categories
      description: REST surface for accounting-categories.
      operations:
      - method: GET
        name: categoriesall
        description: Apideck List Categories
        call: accounting-categories.categoriesall
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/accounting/categories/{id}
      name: accounting-categories-id
      description: REST surface for accounting-categories-id.
      operations:
      - method: GET
        name: categoriesone
        description: Apideck Get Category
        call: accounting-categories.categoriesone
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: accounting-categories-mcp
    port: 9090
    transport: http
    description: MCP adapter for Apideck Accounting API — Categories. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: apideck-list-categories
      description: Apideck List Categories
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: accounting-categories.categoriesall
      outputParameters:
      - type: object
        mapping: $.
    - name: apideck-get-category
      description: Apideck Get Category
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: accounting-categories.categoriesone
      outputParameters:
      - type: object
        mapping: $.
