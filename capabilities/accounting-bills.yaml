    resources:
    - name: accounting-bills
      path: /accounting/bills
      operations:
      - name: billsall
        method: GET
        description: Apideck List Bills
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: billsadd
        method: POST
        description: Apideck Create Bill
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: accounting-bills-id
      path: /accounting/bills/{id}
      operations:
      - name: billsone
        method: GET
        description: Apideck Get Bill
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: billsupdate
