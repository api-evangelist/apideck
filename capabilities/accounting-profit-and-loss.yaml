naftiko: 1.0.0-alpha2
info:
  label: Apideck Accounting API — Profit and Loss
  description: 'Apideck Accounting API — Profit and Loss. 1 operations. Lead operation: Apideck Get Profit and Loss. Self-contained
    Naftiko capability covering one Apideck business surface.'
  tags:
  - Apideck
  - Profit and Loss
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APIDECK_API_KEY: APIDECK_API_KEY
capability:
  consumes:
  - type: http
    namespace: accounting-profit-and-loss
    baseUri: https://unify.apideck.com
    description: Apideck Accounting API — Profit and Loss business capability. Self-contained, no shared references.
    resources:
    - name: accounting-profit-and-loss
      path: /accounting/profit-and-loss
      operations:
      - name: profitandlossone
        method: GET
        description: Apideck Get Profit and Loss
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.APIDECK_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: accounting-profit-and-loss-rest
    port: 8080
    description: REST adapter for Apideck Accounting API — Profit and Loss. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/accounting/profit-and-loss
      name: accounting-profit-and-loss
      description: REST surface for accounting-profit-and-loss.
      operations:
      - method: GET
        name: profitandlossone
        description: Apideck Get Profit and Loss
        call: accounting-profit-and-loss.profitandlossone
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: accounting-profit-and-loss-mcp
    port: 9090
    transport: http
    description: MCP adapter for Apideck Accounting API — Profit and Loss. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: apideck-get-profit-and-loss
      description: Apideck Get Profit and Loss
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: accounting-profit-and-loss.profitandlossone
      outputParameters:
      - type: object
        mapping: $.
