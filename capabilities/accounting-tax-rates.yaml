      outputParameters:
      - type: object
        mapping: $.
    - name: apideck-update-tax-rate
      description: Apideck Update Tax Rate
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: accounting-tax-rates.taxratesupdate
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: apideck-delete-tax-rate
