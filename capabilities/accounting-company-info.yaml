naftiko: 1.0.0-alpha2
info:
  label: Apideck Accounting API — Company Info
  description: 'Apideck Accounting API — Company Info. 1 operations. Lead operation: Apideck Get company info. Self-contained
    Naftiko capability covering one Apideck business surface.'
  tags:
  - Apideck
  - Company Info
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APIDECK_API_KEY: APIDECK_API_KEY
capability:
  consumes:
  - type: http
    namespace: accounting-company-info
    baseUri: https://unify.apideck.com
    description: Apideck Accounting API — Company Info business capability. Self-contained, no shared references.
    resources:
    - name: accounting-company-info
      path: /accounting/company-info
      operations:
      - name: companyinfoone
        method: GET
        description: Apideck Get company info
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.APIDECK_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: accounting-company-info-rest
    port: 8080
    description: REST adapter for Apideck Accounting API — Company Info. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/accounting/company-info
      name: accounting-company-info
      description: REST surface for accounting-company-info.
      operations:
      - method: GET
        name: companyinfoone
        description: Apideck Get company info
        call: accounting-company-info.companyinfoone
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: accounting-company-info-mcp
    port: 9090
    transport: http
    description: MCP adapter for Apideck Accounting API — Company Info. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: apideck-get-company-info
      description: Apideck Get company info
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: accounting-company-info.companyinfoone
      outputParameters:
      - type: object
        mapping: $.
