        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: apideck-get-supplier
      description: Apideck Get Supplier
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: accounting-suppliers.suppliersone
      outputParameters:
      - type: object
        mapping: $.
    - name: apideck-update-supplier
      description: Apideck Update Supplier
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: accounting-suppliers.suppliersupdate
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: apideck-delete-supplier
      description: Apideck Delete Supplier
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: accounting-suppliers.suppliersdelete
      outputParameters:
      - type: object
        mapping: $.
