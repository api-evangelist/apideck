    namespace: accounting-expenses
    baseUri: https://unify.apideck.com
    description: Apideck Accounting API — Expenses business capability. Self-contained, no shared references.
    resources:
    - name: accounting-expenses
      path: /accounting/expenses
      operations:
      - name: expensesall
        method: GET
        description: Apideck List Expenses
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: expensesadd
        method: POST
        description: Apideck Create Expense
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: accounting-expenses-id
      path: /accounting/expenses/{id}
      operations:
      - name: expensesone
        method: GET
        description: Apideck Get Expense
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: expensesupdate
        method: PATCH
        description: Apideck Update Expense
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: expensesdelete
        method: DELETE
        description: Apideck Delete Expense
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.APIDECK_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: accounting-expenses-rest
    port: 8080
    description: REST adapter for Apideck Accounting API — Expenses. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/accounting/expenses
      name: accounting-expenses
      description: REST surface for accounting-expenses.
      operations:
      - method: GET
        name: expensesall
        description: Apideck List Expenses
        call: accounting-expenses.expensesall
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: expensesadd
        description: Apideck Create Expense
        call: accounting-expenses.expensesadd
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/accounting/expenses/{id}
      name: accounting-expenses-id
      description: REST surface for accounting-expenses-id.
      operations:
      - method: GET
        name: expensesone
        description: Apideck Get Expense
        call: accounting-expenses.expensesone
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: expensesupdate
        description: Apideck Update Expense
        call: accounting-expenses.expensesupdate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: expensesdelete
        description: Apideck Delete Expense
        call: accounting-expenses.expensesdelete
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
