    port: 9090
    transport: http
    description: MCP adapter for Apideck Accounting API — Expenses. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: apideck-list-expenses
      description: Apideck List Expenses
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: accounting-expenses.expensesall
      outputParameters:
      - type: object
        mapping: $.
    - name: apideck-create-expense
