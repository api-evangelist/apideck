naftiko: 1.0.0-alpha2
info:
  label: Apideck Accounting API — Expenses
  description: 'Apideck Accounting API — Expenses. 5 operations. Lead operation: Apideck List Expenses. Self-contained Naftiko
    capability covering one Apideck business surface.'
  tags:
  - Apideck
  - Expenses
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APIDECK_API_KEY: APIDECK_API_KEY
capability:
