        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: apideck-get-expense
      description: Apideck Get Expense
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: accounting-expenses.expensesone
      outputParameters:
      - type: object
        mapping: $.
    - name: apideck-update-expense
      description: Apideck Update Expense
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: accounting-expenses.expensesupdate
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: apideck-delete-expense
      description: Apideck Delete Expense
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: accounting-expenses.expensesdelete
      outputParameters:
      - type: object
        mapping: $.
