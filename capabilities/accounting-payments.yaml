    description: Apideck Accounting API — Payments business capability. Self-contained, no shared references.
    resources:
    - name: accounting-payments
      path: /accounting/payments
      operations:
      - name: paymentsall
        method: GET
        description: Apideck List Payments
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: paymentsadd
        method: POST
        description: Apideck Create Payment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: accounting-payments-id
      path: /accounting/payments/{id}
      operations:
      - name: paymentsone
        method: GET
        description: Apideck Get Payment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: paymentsupdate
        method: PATCH
        description: Apideck Update Payment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
