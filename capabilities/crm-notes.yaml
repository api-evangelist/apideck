        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: apideck-get-note
      description: Apideck Get note
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: crm-notes.notesone
      outputParameters:
      - type: object
        mapping: $.
    - name: apideck-update-note
      description: Apideck Update note
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: crm-notes.notesupdate
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: apideck-delete-note
      description: Apideck Delete note
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: crm-notes.notesdelete
      outputParameters:
      - type: object
        mapping: $.
