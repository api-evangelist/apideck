servers:
- url: https://unify.apideck.com
security:
- apiKey: []
tags:
- name: Time Off Requests
  description: A Time Off Request represents an absence request, including type (vacation, sick), dates, status, and approval information.
  x-apideck-resource-id: time-off-requests
  x-apideck-model:
    $ref: '#/components/schemas/TimeOffRequest'
paths:
  /hris/time-off-requests:
    get:
      tags:
      - Time Off Requests
      operationId: timeOffRequestsAll
      summary: Apideck List Time Off Requests
      description: List Time Off Requests
      parameters:
      - $ref: '#/components/parameters/raw'
      - $ref: '#/components/parameters/consumerId'
      - $ref: '#/components/parameters/applicationId'
      - $ref: '#/components/parameters/serviceId'
      - $ref: '#/components/parameters/cursor'
      - $ref: '#/components/parameters/limit'
      - $ref: '#/components/parameters/timeOffRequestsFilter'
      - $ref: '#/components/parameters/passThrough'
      - $ref: '#/components/parameters/fields'
      security:
      - apiKey: []
      x-apideck-gotchas:
      - connector: bamboohr
        description: BambooHR requires start_date and end_date parameters to successfully retrieve time off requests. These optional Unify parameters can be sent as filters[start_date] and filters[end_date]. If there are not present, they are sent to BambooHR with the default values of '1900-01-01' & '2100-12-31' respectively.
      - connector: hr-works
        description: In HR Works the start_date and end_date are required fields and the maximum date interval is one year between start_date and end_date. It doesn't support pagination right now, it can be created as per customer request.
      - connector: kenjo
        description: 'In Kenjo the start_date and end_date are required fields and the maximum date interval is 92 days. We do not support Processed, inApproval and CancelledAfterProcessed filters from Kenjo.

          '
      - connector: payfit
        description: 'In Payfit the start_date parameter is supported only and will provide data of that specific month only. This endpoint is only available for French companies.

          '
      - connector: people-hr
        description: 'In PeopleHR, it is mandatory to provide the employee_id in the filter.

          '
      - connector: charliehr
        description: 'For CharlieHR, when filtering by start_date, the end_date parameter is required. Omitting end_date will result in no data being returned.

          '
      responses:
        '200':
          $ref: '#/components/responses/GetTimeOffRequestsResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '402':
          $ref: '#/components/responses/PaymentRequiredResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '422':
          $ref: '#/components/responses/UnprocessableResponse'
        default:
          $ref: '#/components/responses/UnexpectedErrorResponse'
      x-apideck-api: hris
      x-codeSamples:
      - lang: TypeScript
        label: Node
        source: {}
    post:
      tags:
      - Time Off Requests
      operationId: timeOffRequestsAdd
      summary: Apideck Create Time Off Request
      description: Create Time Off Request
      parameters:
      - $ref: '#/components/parameters/raw'
      - $ref: '#/components/parameters/consumerId'
      - $ref: '#/components/parameters/applicationId'
      - $ref: '#/components/parameters/serviceId'
      security:
      - apiKey: []
      x-apideck-gotchas:
      - connector: people-hr
        description: 'In PeopleHR, day_part value should be AM or PM. It is mandatory to provide the employee_id in the request body.

          '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TimeOffRequest'
      responses:
        '201':
          $ref: '#/components/responses/CreateTimeOffRequestResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '402':
          $ref: '#/components/responses/PaymentRequiredResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '422':
          $ref: '#/components/responses/UnprocessableResponse'
        default:
          $ref: '#/components/responses/UnexpectedErrorResponse'
      x-apideck-api: hris
      x-codeSamples:
      - lang: TypeScript
        label: Node
        source:
          timeOffRequest:
            employee_id: '12345'
            policy_id: '12345'
            status: approved
            description: Enjoying some sun.
            start_date: '2022-04-01'
            end_date: '2022-04-01'
            request_date: '2022-03-21'
            request_type: vacation
            approval_date: '2022-03-21'
            units: hours
            amount: 3.5
            day_part: morning
            notes:
              employee: Relaxing on the beach for a few hours.
              manager: Enjoy!
            pass_through:
            - service_id: string
              operation_id: string
              extend_object: {}
              extend_paths:
              - path: $.nested.property
                value:
                  TaxClassificationRef:
                    value: EUC-99990201-V1-00020000
            policy_type: sick
  /hris/time-off-requests/employees/{employee_id}/time-off-requests/{id}:
    get:
      tags:
      - Time Off Requests
      operationId: timeOffRequestsOne
      summary: Apideck Get Time Off Request
      description: Get Time Off Request
      parameters:
      - $ref: '#/components/parameters/id'
      - $ref: '#/components/parameters/consumerId'
      - $ref: '#/components/parameters/applicationId'
      - $ref: '#/components/parameters/serviceId'
      - $ref: '#/components/parameters/raw'
      - $ref: '#/components/parameters/fields'
      - $ref: '#/components/parameters/employeeId'
      security:
      - apiKey: []
      responses:
        '200':
          $ref: '#/components/responses/GetTimeOffRequestResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '402':
          $ref: '#/components/responses/PaymentRequiredResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '422':
          $ref: '#/components/responses/UnprocessableResponse'
        default:
          $ref: '#/components/responses/UnexpectedErrorResponse'
      x-apideck-api: hris
      x-codeSamples:
      - lang: TypeScript
        label: Node
        source:
          id: id_example
          employeeId: employee_id_example
    patch:
      tags:
      - Time Off Requests
      operationId: timeOffRequestsUpdate
      summary: Apideck Update Time Off Request
      description: Update Time Off Request
      parameters:
      - $ref: '#/components/parameters/id'
      - $ref: '#/components/parameters/consumerId'
      - $ref: '#/components/parameters/applicationId'
      - $ref: '#/components/parameters/serviceId'
      - $ref: '#/components/parameters/raw'
      - $ref: '#/components/parameters/employeeId'
      security:
      - apiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TimeOffRequest'
      responses:
        '200':
          $ref: '#/components/responses/UpdateTimeOffRequestResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '402':
          $ref: '#/components/responses/PaymentRequiredResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '422':
          $ref: '#/components/responses/UnprocessableResponse'
        default:
          $ref: '#/components/responses/UnexpectedErrorResponse'
      x-apideck-api: hris
      x-codeSamples:
      - lang: TypeScript
        label: Node
        source:
          id: id_example
          employeeId: employee_id_example
          timeOffRequest:
            employee_id: '12345'
            policy_id: '12345'
            status: approved
            description: Enjoying some sun.
            start_date: '2022-04-01'
            end_date: '2022-04-01'
            request_date: '2022-03-21'
            request_type: vacation
            approval_date: '2022-03-21'
            units: hours
            amount: 3.5
            day_part: morning
            notes:
              employee: Relaxing on the beach for a few hours.
              manager: Enjoy!
            pass_through:
            - service_id: string
              operation_id: string
              extend_object: {}
              extend_paths:
              - path: $.nested.property
                value:
                  TaxClassificationRef:
                    value: EUC-99990201-V1-00020000
            policy_type: sick
    delete:
      tags:
      - Time Off Requests
      operationId: timeOffRequestsDelete
      summary: Apideck Delete Time Off Request
      description: Delete Time Off Request
      parameters:
      - $ref: '#/components/parameters/id'
      - $ref: '#/components/parameters/consumerId'
      - $ref: '#/components/parameters/applicationId'
      - $ref: '#/components/parameters/serviceId'
      - $ref: '#/components/parameters/raw'
      - $ref: '#/components/parameters/employeeId'
      security:
      - apiKey: []
      responses:
        '200':
          $ref: '#/components/responses/DeleteTimeOffRequestResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '402':
          $ref: '#/components/responses/PaymentRequiredResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '422':
          $ref: '#/components/responses/UnprocessableResponse'
        default:
          $ref: '#/components/responses/UnexpectedErrorResponse'
      x-apideck-api: hris
      x-codeSamples:
      - lang: TypeScript
        label: Node
        source:
          id: id_example
          employeeId: employee_id_example
components:
  schemas:
    TimeOffRequest:
      type: object
      additionalProperties: false
      x-apideck-weights:
        id: high
        employee_id: high
        policy_id: low
        status: high
        description: medium
        start_date: high
        end_date: high
        request_date: medium
        request_type: medium
        approval_date: medium
        units: medium
        amount: medium
        notes: low
        updated_by: edge-case
        created_by: edge-case
        updated_at: medium
        created_at: medium
        policy_type: edge-case
        day_part: edge-case
      properties:
        id:
          $ref: '#/components/schemas/Id'
        employee_id:
          $ref: '#/components/schemas/EmployeeId'
        policy_id:
          type: string
          title: Policy ID
          description: ID of the policy
          example: '12345'
          nullable: true
        status:
          type: string
          title: Status
          enum:
          - requested
          - approved
          - declined
          - cancelled
          - deleted
          - other
          description: The status of the time off request.
          x-apideck-enum-id: time-off-requests.status
          example: approved
          nullable: true
        description:
          type: string
          title: Description
          description: Description of the time off request.
          example: Enjoying some sun.
          nullable: true
        start_date:
          type: string
          description: The start date of the time off request.
          pattern: ^\d{4}-\d{2}-\d{2}$
          example: '2022-04-01'
          nullable: true
        end_date:
          type: string
          description: The end date of the time off request.
          pattern: ^\d{4}-\d{2}-\d{2}$
          example: '2022-04-01'
          nullable: true
        request_date:
          type: string
          description: The date the request was made.
          pattern: ^\d{4}-\d{2}-\d{2}$
          example: '2022-03-21'
          nullable: true
        request_type:
          type: string
          enum:
          - vacation
          - sick
          - personal
          - jury_duty
          - volunteer
          - bereavement
          - other
          description: The type of request
          x-apideck-enum-id: time-off-requests.type
          example: vacation
          nullable: true
        approval_date:
          type: string
          description: The date the request was approved
          pattern: ^\d{4}-\d{2}-\d{2}$
          example: '2022-03-21'
          nullable: true
        units:
          type: string
          enum:
          - days
          - hours
          - other
          description: 'The unit of time off requested. Possible values include: `hours`, `days`, or `other`.'
          x-apideck-enum-id: time-off-requests.units
          example: hours
          nullable: true
        amount:
          type: number
          description: The amount of time off requested.
          example: 3.5
          nullable: true
        day_part:
          type: string
          description: The day part of the time off request.
          example: morning
          nullable: true
        notes:
          type: object
          properties:
            employee:
              type: string
              title: Employee note
              example: Relaxing on the beach for a few hours.
              nullable: true
            manager:
              type: string
