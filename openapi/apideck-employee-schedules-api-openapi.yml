    EmployeeCompensation:
      title: compensation
      x-apideck-weights:
        id: critical
        job_id: medium
        rate: high
        payment_unit: medium
        currency: high
        flsa_status: edge-case
        effective_date: low
        payment_frequency: medium
      x-apideck-strict-required:
      - rate
      - currency
      - payment_unit
