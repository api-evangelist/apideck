servers:
- url: https://unify.apideck.com
security:
- apiKey: []
tags:
- name: Balance Sheet
  description: A Balance Sheet report shows the financial position at a point in time, including totals for assets, liabilities, and equity accounts.
  x-apideck-resource-id: balance-sheet
  x-apideck-model:
    $ref: '#/components/schemas/BalanceSheet'
paths:
  /accounting/balance-sheet:
    get:
      tags:
      - Balance Sheet
      operationId: balanceSheetOne
      summary: Apideck Get BalanceSheet
      description: Get BalanceSheet
      parameters:
      - $ref: '#/components/parameters/consumerId'
      - $ref: '#/components/parameters/applicationId'
      - $ref: '#/components/parameters/serviceId'
      - $ref: '#/components/parameters/companyId'
      - $ref: '#/components/parameters/passThrough'
      - $ref: '#/components/parameters/balanceSheetFilter'
      - $ref: '#/components/parameters/raw'
      security:
      - apiKey: []
      x-apideck-gotchas:
      - connector: quickbooks
        description: When using start and end date filters, QuickBooks requires both to be sent. However, the report only reflects the balance sheet situation as of the end date.
      - connector: netsuite
        description: 'NetSuite date filtering resolves `filter[end_date]` to accounting period IDs via SuiteQL, then filters the SOAP request by periods up to that date. This requires the SuiteAnalytics Workbook permission for period resolution. If unavailable, returns all-time data as fallback. For Balance Sheet, only `filter[end_date]` is meaningful (point-in-time snapshot).

          '
      responses:
        '200':
          $ref: '#/components/responses/GetBalanceSheetResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '402':
          $ref: '#/components/responses/PaymentRequiredResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '422':
          $ref: '#/components/responses/UnprocessableResponse'
        default:
          $ref: '#/components/responses/UnexpectedErrorResponse'
      x-apideck-api: accounting
      x-codeSamples:
      - lang: TypeScript
        label: Node
        source: {}
