    patch:
      tags:
      - Journal Entries
      operationId: journalEntriesUpdate
      summary: Apideck Update Journal Entry
      description: Update Journal Entry
      parameters:
      - $ref: '#/components/parameters/id'
      - $ref: '#/components/parameters/consumerId'
      - $ref: '#/components/parameters/applicationId'
      - $ref: '#/components/parameters/serviceId'
      - $ref: '#/components/parameters/companyId'
      - $ref: '#/components/parameters/raw'
      security:
      - apiKey: []
      x-apideck-gotchas:
      - connector: procountor-fi
        description: 'Procountor only accepts the following values for the tax_code field: SALES, PURCHASE.

          Procountor requires row_version to be set when updating a journal entry. The row_version should be equivalent to the current row_version of the resource

          '
      - connector: netsuite
        description: Netsuite only supports one tracking category at a time so only the first item in the tracking_categories list will be used.
      - connector: quickbooks
        description: 'Quickbooks only supports one tracking category at a time so only the first item in the tracking_categories list will be used.

          When line_items[].tax_type is not set, QuickBooks requires knowing whether the tax applies to a sales or purchase transaction. Unify infers this from line_items[].type: credit lines are treated as sales (TaxApplicableOn: Sales) and debit lines as purchases (TaxApplicableOn: Purchase). This covers the common case of sales summary journal entries. For atypical entries (e.g. a credit to an AP account, or a debit for a sales return), set tax_type explicitly on each line to override the default.

          '
      - connector: xero
        description: 'Xero has two resources: journals (entries from transactions like invoices, payments, or manual journals) and manual journals (user-created entries).

          Draft entries are manual journals. When posted, they become journals and the ID changes. Updating a posted entry creates a reverse journal and a new one, so the ID also changes.

          Xero only supports `draft` and `posted` for the status field.

          For ledger accounts in journal lines, you can use either `ledger_account.id` (UUID) or `ledger_account.code`. If only the ID is provided, the code will be resolved automatically.

          '
      - connector: sage-intacct
        description: 'Sage Intacct only supports `draft` and `posted` status fields when updating a journal entry.

          If no status is provided then the default status is "draft".

          Only Journal Entries with `draft` status can be updated.

          '
      - connector: workday
        description: 'Status should be set to "draft" or "posted". Default status is "draft".

          Only Journal Entries with `draft` status can be updated.

          '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JournalEntry'
      responses:
        '200':
          $ref: '#/components/responses/UpdateJournalEntryResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '402':
          $ref: '#/components/responses/PaymentRequiredResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '422':
          $ref: '#/components/responses/UnprocessableResponse'
        default:
          $ref: '#/components/responses/UnexpectedErrorResponse'
