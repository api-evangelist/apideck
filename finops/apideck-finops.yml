specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Apideck
providerId: apideck
publisherName: Apideck B.V.
serviceCategory: Integrations / Unified API
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - Integrations
  - Unified API
description: FOCUS-aligned FinOps view for Apideck. Charges are tier-based subscriptions denominated in
  EUR with the primary cost driver being Active Consumers (end-customers connecting third-party SaaS via
  Apideck) and number of Unified API categories enabled.
sources:
  - https://www.apideck.com/pricing
billingModel:
  pricingCategory: Tiered Subscription
  billingFrequency: Monthly
  billingCurrency: EUR
  chargeCategories:
    - Purchase
    - Usage
    - Adjustment
focusColumns:
  ServiceName: Apideck Unify
  ServiceCategory: Integrations / Unified API
  ProviderName: Apideck
  PublisherName: Apideck B.V.
  InvoiceIssuerName: Apideck B.V.
  BillingCurrency: EUR
  ChargeCategory: Purchase
  PricingCategory: Tiered Subscription
meters:
  - name: subscription_month
    description: Monthly subscription line for the active plan tier (Launch, Scale, Enterprise)
    unit: month
    aggregation: sum
    dimensions:
      - plan_tier
  - name: active_consumers
    description: Count of unique end-customer consumers (Active Consumers) using Apideck-mediated connections
      in the billing period; the primary tier sizing dimension.
    unit: consumer
    aggregation: max
    dimensions:
      - plan_tier
      - api_category
  - name: unified_api_categories
    description: Number of Unified API categories enabled on the account (1 on Launch, up to 3 on Scale,
      unlimited on Enterprise).
    unit: category
    aggregation: max
    dimensions:
      - plan_tier
  - name: api_requests
    description: Count of requests served through Apideck Unify and Proxy APIs (telemetry; not directly
      billed at Launch/Scale tiers).
    unit: request
    aggregation: sum
    dimensions:
      - api_category
      - consumer
      - connector
  - name: connector_calls
    description: Calls forwarded to downstream connectors (Salesforce, QuickBooks, HubSpot, etc.) for
      cost attribution against connector-specific quotas.
    unit: request
    aggregation: sum
    dimensions:
      - connector
      - consumer
principles:
  - name: Visibility
    description: Use the Apideck dashboard logs and Vault per-consumer usage views to attribute API call
      counts and connector traffic per end-customer.
  - name: Allocation
    description: Tag spend by Active Consumer (end-customer), product line, and Unified API category.
      Active Consumer count is the primary tier-sizing axis and should be reviewed monthly.
  - name: Optimization
    description: Right-size the plan against actual Active Consumers; consolidate to fewer Unified API
      categories on Scale; switch to annual billing for the 10% discount; minimize Proxy API calls when
      a Unified endpoint exists.
  - name: Accountability
    description: Integrations or Platform team owns the Apideck contract; product owners get showback
      based on Active Consumers attributable to their product surface.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
