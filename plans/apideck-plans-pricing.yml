specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Apideck
providerId: apideck
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Integrations
  - Unified API
  - Embedded Integrations
  - Connectors
description: Apideck prices its Unified API as named subscription tiers sized by Active Consumers (the
  count of end-customers connecting third-party apps via Apideck). Plans are EUR-denominated, offer 10%
  discount on annual billing, and include unlimited connections. Enterprise pricing is custom and annually
  billed. A 30-day free trial is available; there is no permanent free plan.
sources:
  - https://www.apideck.com/pricing
plans:
  - id: apideck-launch
    name: Launch
    type: subscription
    description: Entry tier for getting one Unified API category to market with up to 50 active consumers.
    entries:
      - label: Monthly subscription
        name: launch_subscription
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: EUR 599/month
        userMultiplied: false
      - label: Active Consumers included
        name: active_consumers
        type: quota
        metric: consumer
        limit: 50
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Unified API categories
        name: unified_api_categories
        type: quota
        metric: category
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: 1 Unified API category
      - name: Unlimited connections
      - name: Passthrough / Proxy API
      - name: Webhooks
      - name: Business hours support
      - name: 30-day free trial
  - id: apideck-scale
    name: Scale
    type: subscription
    description: Mid-market tier with multiple Unified API categories and 100–250 active consumers, plus
      Custom Field Mapping and early-access Data Scopes.
    entries:
      - label: Monthly subscription
        name: scale_subscription
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: EUR 1,299/month
        userMultiplied: false
      - label: Active Consumers included
        name: active_consumers
        type: quota
        metric: consumer
        limit: 250
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Unified API categories
        name: unified_api_categories
        type: quota
        metric: category
        limit: 3
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: 3 Unified API categories
      - name: Custom Field Mapping
      - name: Data Scopes (early access)
      - name: Unlimited connections
      - name: Webhooks
      - name: Business hours support
  - id: apideck-enterprise
    name: Enterprise
    type: enterprise
    description: Annually-billed custom tier with unlimited categories, sandboxes, SSO, Whitelabel Vault,
      and Enterprise SLA. Starts at 300+ active consumers.
    entries:
      - label: Annual contract
        name: enterprise_contract
        type: subscription
        metric: year
        limit: 1
        timeFrame: year
        geo: global
        unit: 1
        price: custom
        userMultiplied: false
      - label: Active Consumers
        name: active_consumers
        type: quota
        metric: consumer
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: custom
        userMultiplied: false
      - label: Unified API categories
        name: unified_api_categories
        type: quota
        metric: category
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: Unlimited Unified API categories
      - name: Sandboxes
      - name: Single Sign-on (SSO)
      - name: Whitelabel Vault
      - name: Configurable log retention
      - name: Enterprise SLA
      - name: Connector Prioritization (add-on)
      - name: Dedicated Account Manager (add-on)
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
