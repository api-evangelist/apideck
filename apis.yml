apis:
  - aid: apideck:apideck
    name: Apideck
    tags:
      - Integrations
      - Unified API
    humanURL: ' https://www.apideck.com/'
    baseURL: https://unify.apideck.com
    properties:
      - url: ' https://www.apideck.com/'
        type: Documentation
      - url: https://developers.apideck.com/apis
        type: Documentation
      - url: https://developers.apideck.com/get-started
        type: GettingStarted
    description: >-
      Apideck is the leading Unified API that doesn't store sensitive customer data. Build and maintain native integrations into your product with an exceptional Developer Experience.
  - aid: apideck:accounting-api
    name: Apideck Accounting API
    tags:
      - Accounting
      - Invoices
      - Payments
      - Unified API
    humanURL: https://developers.apideck.com/apis/accounting/reference
    baseURL: https://unify.apideck.com
    properties:
      - url: https://developers.apideck.com/apis/accounting/reference
        type: Documentation
      - url: openapi/apideck-accounting-openapi.yml
        type: OpenAPI
    description: >-
      The Apideck Accounting API is a unified API for managing financial
      operations including invoices, customers, bills, payments, and financial
      reporting across multiple accounting platforms such as QuickBooks, Xero,
      FreshBooks, and Sage.
  - aid: apideck:crm-api
    name: Apideck CRM API
    tags:
      - Contacts
      - CRM
      - Leads
      - Unified API
    humanURL: https://developers.apideck.com/apis/crm/reference
    baseURL: https://unify.apideck.com
    properties:
      - url: https://developers.apideck.com/apis/crm/reference
        type: Documentation
      - url: openapi/apideck-crm-openapi.yml
        type: OpenAPI
    description: >-
      The Apideck CRM API is a unified API for managing customer relationships
      through opportunities, companies, leads, contacts, pipelines, notes, and
      activities across multiple CRM platforms such as Salesforce, HubSpot,
      Pipedrive, and Zoho CRM.
  - aid: apideck:hris-api
    name: Apideck HRIS API
    tags:
      - Employees
      - HRIS
      - Human Resources
      - Unified API
    humanURL: https://developers.apideck.com/apis/hris/reference
    baseURL: https://unify.apideck.com
    properties:
      - url: https://developers.apideck.com/apis/hris/reference
        type: Documentation
      - url: openapi/apideck-hris-openapi.yml
        type: OpenAPI
    description: >-
      The Apideck HRIS API is a unified API for managing human resources data
      for employees, companies, departments, and time-off requests across
      multiple HR platforms such as BambooHR, Personio, Workday, and SAP
      SuccessFactors.
  - aid: apideck:ats-api
    name: Apideck ATS API
    tags:
      - Applicant Tracking
      - ATS
      - Recruitment
      - Unified API
    humanURL: https://developers.apideck.com/apis/ats/reference
    baseURL: https://unify.apideck.com
    properties:
      - url: https://developers.apideck.com/apis/ats/reference
        type: Documentation
      - url: https://specs.apideck.com/ats.yml
        type: OpenAPI
    description: >-
      The Apideck ATS API is a unified API for handling recruitment workflows
      including jobs, applicants, and applications across multiple applicant
      tracking systems such as Greenhouse, Lever, Bullhorn, Recruitee, and
      Workable.
  - aid: apideck:file-storage-api
    name: Apideck File Storage API
    tags:
      - Cloud Storage
      - File Storage
      - Files
      - Unified API
    humanURL: https://developers.apideck.com/apis/file-storage/reference
    baseURL: https://unify.apideck.com
    properties:
      - url: https://developers.apideck.com/apis/file-storage/reference
        type: Documentation
      - url: openapi/apideck-file-storage-openapi.yml
        type: OpenAPI
    description: >-
      The Apideck File Storage API is a unified API for handling cloud file
      operations including files, folders, shared links, and drives across
      multiple cloud storage platforms such as Google Drive, Dropbox, Box,
      OneDrive, and SharePoint.
  - aid: apideck:ecommerce-api
    name: Apideck Ecommerce API
    tags:
      - Ecommerce
      - Orders
      - Products
      - Unified API
    humanURL: https://developers.apideck.com/apis/ecommerce/reference
    baseURL: https://unify.apideck.com
    properties:
      - url: https://developers.apideck.com/apis/ecommerce/reference
        type: Documentation
      - url: https://specs.apideck.com/ecommerce.yml
        type: OpenAPI
    description: >-
      The Apideck Ecommerce API is a unified API for managing orders, products,
      customers, and stores across multiple ecommerce platforms such as Shopify,
      BigCommerce, WooCommerce, Magento, and Etsy.
  - aid: apideck:pos-api
    name: Apideck POS API
    tags:
      - Payments
      - Point of Sale
      - POS
      - Unified API
    humanURL: https://developers.apideck.com/apis/pos/reference
    baseURL: https://unify.apideck.com
    properties:
      - url: https://developers.apideck.com/apis/pos/reference
        type: Documentation
      - url: https://specs.apideck.com/pos.yml
        type: OpenAPI
    description: >-
      The Apideck POS API is a unified API for handling point-of-sale operations
      including orders, payments, items, locations, merchants, and modifiers
      across multiple POS platforms such as Square, Clover, Lightspeed, and
      Toast.
  - aid: apideck:issue-tracking-api
    name: Apideck Issue Tracking API
    tags:
      - Issue Tracking
      - Project Management
      - Tickets
      - Unified API
    humanURL: https://developers.apideck.com/apis/issue-tracking/reference
    baseURL: https://unify.apideck.com
    properties:
      - url: https://developers.apideck.com/apis/issue-tracking/reference
        type: Documentation
      - url: https://specs.apideck.com/issue-tracking.yml
        type: OpenAPI
    description: >-
      The Apideck Issue Tracking API is a unified API for managing tickets,
      comments, collections, and tags across multiple issue tracking platforms
      such as Jira, Linear, GitHub, and GitLab.
  - aid: apideck:lead-api
    name: Apideck Lead API
    tags:
      - Leads
      - Marketing
      - Sales
      - Unified API
    humanURL: https://developers.apideck.com/apis/lead/reference
    baseURL: https://unify.apideck.com
    properties:
      - url: https://developers.apideck.com/apis/lead/reference
        type: Documentation
      - url: https://specs.apideck.com/lead.yml
        type: OpenAPI
    description: >-
      The Apideck Lead API is a unified API for managing sales and marketing
      leads across multiple platforms such as Salesforce, HubSpot, Pipedrive,
      and Zoho CRM with standardized fields for contacts, companies, and lead
      status.
  - aid: apideck:sms-api
    name: Apideck SMS API
    tags:
      - Messaging
      - SMS
      - Unified API
    humanURL: https://developers.apideck.com/apis/sms/reference
    baseURL: https://unify.apideck.com
    properties:
      - url: https://developers.apideck.com/apis/sms/reference
        type: Documentation
      - url: https://specs.apideck.com/sms.yml
        type: OpenAPI
    description: >-
      The Apideck SMS API is a unified API for sending and managing SMS and MMS
      messages across multiple messaging providers such as Twilio, Vonage,
      MessageBird, Plivo, and Telnyx.
  - aid: apideck:vault-api
    name: Apideck Vault API
    tags:
      - Authentication
      - Credentials
      - OAuth
      - Unified API
    humanURL: https://developers.apideck.com/apis/vault/reference
    baseURL: https://unify.apideck.com
    properties:
      - url: https://developers.apideck.com/apis/vault/reference
        type: Documentation
      - url: https://specs.apideck.com/vault.yml
        type: OpenAPI
    description: >-
      The Apideck Vault API handles OAuth flows, stores API keys, and refreshes
      access tokens from consumers. It supports managed authentication through
      Vault JS, Hosted Vault, and direct API calls for custom implementations.
  - aid: apideck:webhook-api
    name: Apideck Webhook API
    tags:
      - Events
      - Unified API
      - Webhooks
    humanURL: https://developers.apideck.com/apis/webhook/reference
    baseURL: https://unify.apideck.com
    properties:
      - url: https://developers.apideck.com/apis/webhook/reference
        type: Documentation
      - url: https://specs.apideck.com/webhook.yml
        type: OpenAPI
    description: >-
      The Apideck Webhook API enables developers to monitor and manage event
      subscriptions, create webhook endpoints, and track delivery attempts
      across all unified APIs including CRM, accounting, HRIS, and more.
  - aid: apideck:connector-api
    name: Apideck Connector API
    tags:
      - Connectors
      - Integrations
      - Unified API
    humanURL: https://developers.apideck.com/apis/connector/reference
    baseURL: https://unify.apideck.com
    properties:
      - url: https://developers.apideck.com/apis/connector/reference
        type: Documentation
      - url: https://specs.apideck.com/connector.yml
        type: OpenAPI
    description: >-
      The Apideck Connector API provides access to the catalog of available
      connectors, their supported resources, and configuration details for
      pushing and pulling data from multiple downstream services.
  - aid: apideck:proxy-api
    name: Apideck Proxy API
    tags:
      - Monitoring
      - Proxy
      - Unified API
    humanURL: https://developers.apideck.com/apis/proxy/reference
    baseURL: https://unify.apideck.com
    properties:
      - url: https://developers.apideck.com/apis/proxy/reference
        type: Documentation
      - url: https://specs.apideck.com/proxy.yml
        type: OpenAPI
    description: >-
      The Apideck Proxy API forwards requests to downstream services while
      automatically injecting authentication credentials from stored vault data,
      enabling API traffic logging and monitoring for every API call.
